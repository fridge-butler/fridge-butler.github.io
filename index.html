<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Fridge Butler...</title>
  <style>
    body {
      background-color: #F5F7FA;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    h2 { color: #1A1D27; margin-bottom: 8px; }
    p { color: #6B7280; margin-bottom: 24px; }
    .button {
      background-color: #3B82F6;
      color: #FFFFFF;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-block;
    }
  </style>
  <script>
    window.onload = function() {
      // 1. Grab the Supabase PKCE code from the URL
      var params = window.location.search;
      
      // 2. Construct your app's custom deep link
      var appUrl = "fridgemanager://update-password" + params;
      
      // 3. Attempt to launch the app securely via JavaScript
      setTimeout(function() {
        window.location.replace(appUrl);
      }, 500);
      
      // 4. Update the fallback button just in case the browser is very strict
      document.getElementById('manual-btn').href = appUrl;
    };
  </script>
</head>
<body>
  <h2>Opening Fridge Butler...</h2>
  <p>You are being redirected to the app to update your password securely.</p>
  <a id="manual-btn" href="#" class="button">Open App</a>
</body>
</html>
